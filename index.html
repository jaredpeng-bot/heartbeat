<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>hyq&pjh · 心跳同频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(140deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* 标题 */
        .title {
            text-align: center;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* 生日倒计时 */
        .anniversary {
            text-align: center;
            color: #fff;
            font-size: 14px;
            background: rgba(255, 60, 110, 0.15);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* 爱心区域 */
        .heart-row {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
        }

        .heart-box {
            text-align: center;
            flex: 1;
        }

        .name-tag {
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .heart {
            font-size: 70px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        /* 核心心跳动画（极简） */
        .beat {
            animation: beat 0.3s ease-in-out;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* +1 极简上浮 */
        .plus-one {
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 18px;
            color: #ff3366;
            font-weight: bold;
            animation: plusOne 0.8s forwards;
            pointer-events: none;
        }

        @keyframes plusOne {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .count {
            color: #fff;
            font-size: 14px;
            margin-top: 8px;
        }

        .status {
            font-size: 12px;
            color: #fff;
            background: rgba(0,0,0,0.15);
            padding: 2px 8px;
            border-radius: 8px;
            margin-top: 5px;
            display: inline-block;
        }

        .status.online {
            background: #22c55e;
        }

        /* 打卡区域（极简） */
        .checkin-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .checkin-title {
            color: #fff;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .checkin-btn {
            background: #ff4d7a;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .checkin-btn:active {
            transform: scale(0.95);
        }

        .checkin-record {
            color: #fff;
            font-size: 13px;
            margin-top: 8px;
        }

        /* 极简留言 */
        .message-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
        }

        .message-title {
            color: #fff;
            font-size: 15px;
            margin-bottom: 10px;
        }

        #msgInput {
            width: 100%;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 8px;
        }

        #msgInput::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .send-btn {
            background: #ff8da1;
            color: #fff;
            border: none;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
        }

        .msg-list {
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 13px;
            color: #fff;
        }

        .msg-item {
            background: rgba(255,255,255,0.08);
            padding: 5px 10px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .tips {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">hyq&pjh · 心跳同频</div>
        <div class="anniversary" id="anniversary"></div>

        <div class="heart-row">
            <div class="heart-box">
                <div class="name-tag">pjh · 我</div>
                <div class="heart" id="myHeart">❤️</div>
                <div class="count" id="myCount">心动：0</div>
                <div class="status" id="myStatus">连接中</div>
            </div>
            <div class="heart-box">
                <div class="name-tag">hyq · 宝贝</div>
                <div class="heart" id="taHeart">❤️</div>
                <div class="count" id="taCount">心动：0</div>
                <div class="status" id="taStatus">离线</div>
            </div>
        </div>

        <div class="checkin-box">
            <div class="checkin-title">每日打卡 · 想你</div>
            <button class="checkin-btn" id="checkInBtn">今日打卡</button>
            <div class="checkin-record" id="checkInRecord">累计打卡：0 天</div>
        </div>

        <div class="message-box">
            <div class="message-title">悄悄话</div>
            <input id="msgInput" placeholder="说点什么...">
            <button class="send-btn" id="sendMsg">发送</button>
            <div class="msg-list" id="msgList"></div>
        </div>

        <div class="tips">点击爱心心动+1 · 实时同步</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // Firebase 配置（保留你的配置）
        const firebaseConfig = {
            apiKey: "AIzaSyAihhdwjaqMxNqsA2CAroY5v5sKaaLeM4c",
            authDomain: "we-are-together-c789f.firebaseapp.com",
            databaseURL: "https://we-are-together-c789f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "we-are-together-c789f",
            storageBucket: "we-are-together-c789f.firebasestorage.app",
            messagingSenderId: "798844688328",
            appId: "1:798844688328:web:a2d77e2500a3aa1214d2fd",
            measurementId: "G-KLTF9MVX4T"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 核心配置（极简）
        const u = new URLSearchParams(location.search).get("user");
        const ME = u === "hyq" ? "hyq" : "pjh";
        const TA = ME === "pjh" ? "hyq" : "pjh";
        const ROOM = "love_hyq_pjh";

        const root = db.ref(`love_room/${ROOM}`);
        const meRef  = root.child(ME);
        const taRef  = root.child(TA);
        const global = root.child("global");

        // 生日倒计时（3.24）
        function showAnniv() {
            const BIRTH = new Date("2026-03-24"); // 固定生日3.24
            const now = new Date();
            const diff = BIRTH - now;
            
            // 生日当天/已过显示祝福
            if (diff <= 0) {
                document.getElementById("anniversary").innerText = "🥳 宝贝生日快乐 · 岁岁年年";
                return;
            }
            
            const d = Math.floor(diff / 86400000);
            document.getElementById("anniversary").innerText = `距离宝贝生日还有 ${d} 天🎂`;
        }
        showAnniv();

        // 在线状态（极简）
        function setOnline(v) {
            meRef.child("online").set(v);
            const el = document.getElementById("myStatus");
            el.innerText = v ? "在线 ❤️" : "离线";
            el.className = "status " + (v ? "online" : "");
        }
        setOnline(true);
        window.onbeforeunload = () => setOnline(false);
        setInterval(() => document.visibilityState === "visible" && setOnline(true), 30000);

        // 对方在线状态同步
        taRef.child("online").on("value", s => {
            const v = s.val();
            const el = document.getElementById("taStatus");
            el.innerText = v ? "在线 ❤️" : "离线";
            el.className = "status " + (v ? "online" : "");
        });

        // 心动计数（极简）
        let myCount = 0, taCount = 0;
        meRef.child("heart").on("value", s => {
            myCount = s.val() || 0;
            document.getElementById("myCount").innerText = `心动：${myCount}`;
        });
        taRef.child("heart").on("value", s => {
            taCount = s.val() || 0;
            document.getElementById("taCount").innerText = `心动：${taCount}`;
        });

        // +1 极简动画（无多余特效）
        function plusOneAnimation(el) {
            const span = document.createElement("div");
            span.className = "plus-one";
            span.innerText = "+1";
            el.appendChild(span);
            setTimeout(() => span.remove(), 800);
        }

        // 点击爱心（核心交互）
        document.getElementById("myHeart").onclick = () => {
            // +1 动画
            plusOneAnimation(document.getElementById("myHeart"));
            // 同步计数
            meRef.child("heart").set((myCount || 0) + 1);
            meRef.child("lastBeat").set(Date.now());
            // 心跳动画
            const el = document.getElementById("myHeart");
            el.classList.add("beat");
            setTimeout(() => el.classList.remove("beat"), 300);
        };

        // 对方心跳同步
        taRef.child("lastBeat").on("value", s => {
            if (!s.val()) return;
            const el = document.getElementById("taHeart");
            el.classList.add("beat");
            setTimeout(() => el.classList.remove("beat"), 300);
            // 轻微震动（可选）
            navigator.vibrate && navigator.vibrate(80);
        });

        // 每日打卡（极简）
        const today = new Date().toLocaleDateString();
        document.getElementById("checkInBtn").onclick = () => {
            global.child("lastCheckIn").once("value", s => {
                if (s.val() === today) {
                    alert("✅ 今日已打卡～");
                    return;
                }
                global.child("checkInDays").transaction(v => (v || 0) + 1);
                global.child("lastCheckIn").set(today);
                alert("💖 打卡成功～");
            });
        };
        global.child("checkInDays").on("value", s => {
            const v = s.val() || 0;
            document.getElementById("checkInRecord").innerText = `累计打卡：${v} 天`;
        });

        // 极简留言
        document.getElementById("sendMsg").onclick = () => {
            const text = document.getElementById("msgInput").value.trim();
            if (!text) return;
            global.child("messages").push({
                name: ME,
                text: text,
                time: Date.now()
            });
            document.getElementById("msgInput").value = "";
        };
        global.child("messages").on("child_added", s => {
            const data = s.val();
            const item = document.createElement("div");
            item.className = "msg-item";
            item.innerText = `${data.name}：${data.text}`;
            document.getElementById("msgList").appendChild(item);
            document.getElementById("msgList").scrollTop = 9999;
        });
    </script>
</body>
</html>
